version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: app_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: 
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: backend
    volumes:
      - ../backend:/app 
    working_dir: /app
    command: bash -c "dotnet restore && dotnet watch run --urls=http://0.0.0.0:5000"
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=app_db;Username=postgres;Password=postgres;
    depends_on:
      - db

  frontend:
    build: 
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: frontend
    volumes:
      - ../frontend:/app 
    working_dir: /app
    command: bash -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data: